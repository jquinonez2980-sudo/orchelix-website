<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors · Brand gradient</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
  .title { font: 700 14px/1 var(--font-display); letter-spacing: -0.01em; }
  .sub { font: 400 11px/1 var(--font-body); color: var(--ink-3); }
  .stack { display: grid; gap: 10px; }
  .strip { height: 64px; border-radius: 12px; display: flex; align-items: center; padding: 0 18px; box-shadow: var(--shadow-inset-hairline); }
  .strip .nm { font: 700 13px/1 var(--font-display); }
  .strip .desc { font: 400 11px/1 var(--font-mono); margin-left: auto; opacity: .8; }
  .g1 { background: linear-gradient(135deg,#0A2540 0%,#1B355A 45%,#14B8A6 100%); color: #fff; }
  .g2 { background: linear-gradient(135deg,#EEF2F6 0%,#E6FAF7 100%); color: var(--navy-700); }
  .g3 { background: radial-gradient(120% 140% at 0% 0%, #14B8A6 0%, #0A2540 70%); color: #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="title">Brand gradients</div>
    <div class="sub">Navy → teal. Use sparingly — heroes, key surfaces.</div>
  </div>
  <div class="stack">
    <div class="strip g1"><span class="nm">Helix · primary</span><span class="desc">linear 135° · navy → teal</span></div>
    <div class="strip g2"><span class="nm">Helix · soft</span><span class="desc">navy-50 → teal-50</span></div>
    <div class="strip g3"><span class="nm">Helix · radial</span><span class="desc">spotlight · top-left</span></div>
  </div>
</div>
</body>
</html>
