<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing · Elevation</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 32px; background: #FBFBFC; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; }
  .title { font: 700 14px/1 var(--font-display); }
  .sub { font: 400 11px/1 var(--font-body); color: var(--ink-3); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { text-align: center; }
  .box {
    width: 100%; aspect-ratio: 1 / 1; background: #fff; border-radius: 12px;
  }
  .lbl { font: 500 11px/1.2 var(--font-mono); color: var(--ink-2); margin-top: 10px; }
  .val { font: 400 10px/1.3 var(--font-body); color: var(--ink-3); margin-top: 2px; }
  .s-xs { box-shadow: 0 1px 2px rgba(10,37,64,.06); }
  .s-sm { box-shadow: 0 2px 4px rgba(10,37,64,.06), 0 1px 2px rgba(10,37,64,.04); }
  .s-md { box-shadow: 0 8px 20px rgba(10,37,64,.08), 0 2px 4px rgba(10,37,64,.04); }
  .s-lg { box-shadow: 0 20px 40px rgba(10,37,64,.10), 0 4px 8px rgba(10,37,64,.04); }
  .s-xl { box-shadow: 0 30px 60px rgba(10,37,64,.14); }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="title">Elevation</div>
    <div class="sub">Navy-tinted, never pure black.</div>
  </div>
  <div class="grid">
    <div class="item"><div class="box s-xs"></div><div class="lbl">xs</div><div class="val">hairline</div></div>
    <div class="item"><div class="box s-sm"></div><div class="lbl">sm</div><div class="val">resting</div></div>
    <div class="item"><div class="box s-md"></div><div class="lbl">md</div><div class="val">hover · card</div></div>
    <div class="item"><div class="box s-lg"></div><div class="lbl">lg</div><div class="val">menu · modal</div></div>
    <div class="item"><div class="box s-xl"></div><div class="lbl">xl</div><div class="val">dialog</div></div>
  </div>
</div>
</body>
</html>
