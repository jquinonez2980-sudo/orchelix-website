<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components · Badges & status</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 32px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .title { font: 700 14px/1 var(--font-display); }
  .sub { font: 400 11px/1 var(--font-body); color: var(--ink-3); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  .row .lab { width: 80px; font: 500 11px/1 var(--font-mono); color: var(--ink-3); }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    font: 600 11.5px/1 var(--font-display);
    letter-spacing: 0.02em;
    padding: 5px 9px;
    border-radius: 999px;
    border: 1px solid transparent;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .b-neutral { background: var(--surface-2); color: var(--ink-2); border-color: var(--line); }
  .b-info    { background: #EBF2FA; color: #2E6FB0; }
  .b-success { background: var(--teal-50); color: var(--teal-800); }
  .b-warning { background: #FAF1DD; color: #8E6210; }
  .b-danger  { background: #F8E4E3; color: #7A2925; }
  .b-brand   { background: var(--navy-600); color: #fff; }
  .b-accent  { background: var(--teal-500); color: #042B26; }
  .b-outline { background: transparent; color: var(--ink-2); border-color: var(--line-strong); }

  /* count + status row */
  .count { background: var(--navy-600); color: #fff; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; font: 700 10px/18px var(--font-display); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="title">Badges & status pills</div>
    <div class="sub">Pill-shape. Always with a left dot for status.</div>
  </div>
  <div class="row"><div class="lab">Status</div>
    <span class="badge b-success"><span class="dot"></span>Live</span>
    <span class="badge b-info"><span class="dot"></span>Running</span>
    <span class="badge b-warning"><span class="dot"></span>Needs review</span>
    <span class="badge b-danger"><span class="dot"></span>Failed</span>
    <span class="badge b-neutral"><span class="dot"></span>Idle</span>
  </div>
  <div class="row"><div class="lab">Tag</div>
    <span class="badge b-brand">New</span>
    <span class="badge b-accent">Beta</span>
    <span class="badge b-outline">FR · ES</span>
    <span class="badge b-outline">SOC 2</span>
    <span class="badge b-neutral">v0.4.1</span>
  </div>
  <div class="row"><div class="lab">Counts</div>
    <span class="count">3</span>
    <span class="count">12</span>
    <span class="count" style="background:var(--teal-600)">99+</span>
  </div>
</div>
</body>
</html>
